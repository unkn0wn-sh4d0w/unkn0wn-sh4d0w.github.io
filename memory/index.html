<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji Memory</title>
<style>
  body {
    font-family: sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #f0f0f0;
    margin: 0;
    padding: 20px;
  }

  h1 {
    margin-bottom: 20px;
  }

  #game {
    display: grid;
    grid-template-columns: repeat(8, 60px);
    grid-gap: 10px;
  }

  .card {
    width: 60px;
    height: 60px;
    background: #4a90e2;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    cursor: pointer;
    border-radius: 8px;
    user-select: none;
    transition: transform 0.3s, background 0.3s;
    color: #000; /* emoji color */
  }

  .card.flipped {
    background: #fff;
    transform: rotateY(180deg);
  }

  .card.matched {
    background: #50e3c2;
    cursor: default;
    color: #000; /* emoji visible */
  }

  #reloadBtn {
    margin-top: 20px;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 6px;
    background: #4a90e2;
    color: #fff;
    cursor: pointer;
    display: none;
  }

  #reloadBtn:hover {
    background: #357ab7;
  }
</style>
</head>
<body>
<h1>Emoji Memory</h1>
<div id="game"></div>
<button id="reloadBtn" onclick="location.reload()">Play Again</button>

<script>
const emojiList = [
  "😀","😃","😄","😁","😆","😅","😂","🤣","🥲","☺️","😊","😇","🙂","🙃","😉","😌","😍","🥰","😘","😗",
  "😙","😚","😋","😛","😝","😜","🤪","🤨","🧐","🤓","😎","🥸","🤩","🥳","😏","😒","😞","😔","😟","😕",
  "🙁","☹️","😣","😖","😫","😩","🥺","😢","😭","😤","😠","😡","🤬","🤯","😳","🥵","🥶","😱","😨","😰",
  "😥","😓","🤗","🤔","🤭","🤫","🤥","😶","😐","😑","😬","🙄","😯","😦","😧","😮","😲","🥱","😴","🤤",
  "😪","😵","🤐","🥴","🤢","🤮","🤧","😷","🤒","🤕","🤑","🤠","😈","👿","👹","👺","💀","☠️","👻","👽",
  "👾","🤖","🎃","😺","😸","😹","😻","😼","😽","🙀","😿","😾"
];

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

let selectedEmojis = shuffle(emojiList).slice(0, 20);
let gameEmojis = shuffle([...selectedEmojis, ...selectedEmojis]);

const game = document.getElementById('game');
let firstCard = null;
let secondCard = null;
let lockBoard = false;
let matches = 0;

gameEmojis.forEach(emoji => {
  const card = document.createElement('div');
  card.classList.add('card');
  card.dataset.emoji = emoji;
  card.addEventListener('click', flipCard);
  game.appendChild(card);
});

function flipCard(e) {
  if (!e.currentTarget.classList.contains('card')) return;

  if (lockBoard || this.classList.contains('matched')) return;
  if (this === firstCard) return;

  this.textContent = this.dataset.emoji;
  this.classList.add('flipped');

  if (!firstCard) {
    firstCard = this;
    return;
  }

  secondCard = this;
  lockBoard = true;

  if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
    firstCard.classList.add('matched');
    secondCard.classList.add('matched');
    resetTurn();
    matches++;
    if (matches === selectedEmojis.length) {
      document.getElementById('reloadBtn').style.display = 'block';
    }
  } else {
    setTimeout(() => {
      firstCard.textContent = '';
      secondCard.textContent = '';
      firstCard.classList.remove('flipped');
      secondCard.classList.remove('flipped');
      resetTurn();
    }, 800);
  }
}

function resetTurn() {
  [firstCard, secondCard] = [null, null];
  lockBoard = false;
}
</script>
</body>
</html>
