<style>
:root{
    --accent:#e50914;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:#000;
    color:#fff;
    font-family:Arial;
}

.entry{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:radial-gradient(circle,#0a0a0a,#000);
}

.entry-box{
    text-align:center;
}

.langs{
    display:flex;
    gap:15px;
    justify-content:center;
    margin-bottom:25px;
}

.lang-btn{
    padding:12px 25px;
    border-radius:30px;
    background:#222;
    cursor:pointer;
    transition:.3s;
}

.lang-btn.active{
    background:var(--accent);
}

.enter-btn{
    padding:14px 40px;
    border-radius:30px;
    border:none;
    background:#333;
    color:#888;
    cursor:not-allowed;
    transition:.3s;
}

.enter-btn.enabled{
    background:var(--accent);
    color:#fff;
    cursor:pointer;
}

.main{
    display:none;
    padding:80px 5%;
}

.title{
    margin-bottom:20px;
}

.list{
    display:relative;
}

.item{
    padding:12px 18px;
    margin-top: 10px;
    border-radius:30px;
    background:#111;
    cursor:pointer;
    transition:.3s;
}

.item:hover{
    background:var(--accent);
}

.modal{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    align-items:center;
    justify-content:center;
    flex-direction:column;
}

.close{
    position:absolute;
    top:20px;
    right:20px;
    font-size:30px;
    cursor:pointer;
}
.video-container {
    position: relative;
    width: 90vw;
    max-width: 1200px;
    aspect-ratio: 16 / 9;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 0 40px rgba(229, 9, 20, 0.3);
}

#videoPlayer {
    width: 100%;
    height: 100%;
    background: #000;
}

:fullscreen #videoPlayer,
:-webkit-full-screen #videoPlayer,
:-moz-full-screen #videoPlayer,
:-ms-fullscreen #videoPlayer {
    width: 100% !important;
    height: 100% !important;
}
.controls{
    margin-top:10px;
    display:flex;
    gap:10px;
}

.logo {
    margin-bottom: 40px;
}

.title-logo {
    max-width: 420px;
    width: 100%;
    height: auto;
    transition: transform 0.4s ease;
    image-rendering: crisp-edges;
}

.btn{
    padding:10px 20px;
    border-radius:25px;
    background:#222;
    border:none;
    color:#fff;
    cursor:pointer;
}

.ep{
    margin-top:10px;
    color:#aaa;

const chapters = {
    en:{
        1:"Welcome to Hawkins, New Kid",
        2:"Bad Harvest",
        3:"Evolution",
        4:"The Confession",
        5:"The Weekly Watcher",
        6:"A Storm is Coming",
        7:"Enter the Storm",
        8:"The Party",
        9:"The Suspect",
        10:"Countdown"
    },
    de:{
        1:"Willkommen in Hawkins",
        2:"Schlechte Ernte",
        3:"Evolution",
        4:"Das Geständnis",
        5:"Der Weekl, Watcher",
        6:"Ein Sturm zieht auf",
        7:"Gefangen im Sturm",
        8:"Die Party",
        9:"Der Verdacht",
        10:"Ein letzter Wettlauf gegen die Zeit"
    }
};

let lang=null;
let currentEpisode=1;

function selectLang(l, el){
    lang=l;

    document.querySelectorAll(".lang-btn").forEach(btn=>btn.classList.remove("active"));
    el.classList.add("active");

    const btn=document.getElementById("enterBtn");
    btn.classList.add("enabled");

    const note=document.getElementById("adNote");

    if(lang === "de"){
        note.innerText = "Wir empfehlen ein AdBlocker für ein besseres Seherlebnis.";
    } else {
        note.innerText = "";
    }
}

function enter(){
    if(!lang) return;

    document.getElementById("entry").style.display="none";
    document.getElementById("main").style.display="block";

    render();
}

function render(){
    document.getElementById("episodesTitle").innerText = text[lang].episodes;

    const list = document.getElementById("list");
    list.innerHTML = "";

    episodes.forEach(e => {
        const el = document.createElement("div");
        el.className = "item";

        const name = chapters[lang] && chapters[lang][e.id];
        const numText = lang === "en"
    ? numberToEnglish(e.id)
    : numberToGerman(e.id);

el.innerText =
    (lang === "en" ? "Chapter " : "Kapitel ") +
    numText +
    (name ? " - " + name : "");

        el.onclick = () => openPlayer(e.id);
        list.appendChild(el);
    });
}

function openPlayer(id) {
    currentEpisode = id;
    document.getElementById("modal").style.display = "flex";
    loadVideo();
}

function loadVideo() {
    const url = videos[lang][currentEpisode];

    if (!url) {
        alert("No video available for this episode yet.");
        return;
    }

    const video = document.getElementById("videoPlayer");
    const iframe = document.getElementById("iframePlayer");
    const epText = document.getElementById("epText");

    const name = chapters[lang][currentEpisode] || "";

    epText.innerText =
        (lang === "en" ? "Episode " : "Folge ") +
        currentEpisode +
        (name ? " - " + name : "");

    if (url.includes("voe.sx")) {
        video.style.display = "none";
        iframe.style.display = "block";
        iframe.src = url;
        return;
    }

    iframe.style.display = "none";
    video.style.display = "block";
    iframe.src = "";

    video.innerHTML = '';

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);

        hls.on(Hls.Events.MANIFEST_PARSED, () => {
            video.play().catch(() => {});
        });
    } 
    else if (video.canPlayType('application/vnd.apple.mpegurl')) {
        video.src = url;
        video.play().catch(() => {});
    } 
    else {
        alert("Your browser does not support HLS playback.");
    }
}

function nextEpisode() {
    if (currentEpisode < 10) {
        currentEpisode++;
        loadVideo();
    }
}

function prevEpisode() {
    if (currentEpisode > 1) {
        currentEpisode--;
        loadVideo();
    }
}

function closePlayer() {
    const video = document.getElementById("videoPlayer");
    video.pause();
    document.getElementById("modal").style.display = "none";
}
