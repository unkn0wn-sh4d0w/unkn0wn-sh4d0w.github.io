<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TERMINAL</title>
<style>
    body {
        margin: 0;
        height: 100vh;
        background: black;
        color: #00ff9f;
        font-family: "Courier New", monospace;
        display: flex;
        justify-content: center;
        align-items: center;
    }.terminal {
    border: 2px solid #00ff9f;
    padding: 30px;
    width: 400px;
    text-align: center;
    box-shadow: 0 0 20px #00ff9f;
}

h1 {
    font-size: 18px;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

input {
    width: 80%;
    padding: 10px;
    background: black;
    border: 1px solid #00ff9f;
    color: #00ff9f;
    font-size: 18px;
    text-align: center;
    outline: none;
}

.message {
    margin-top: 20px;
    height: 20px;
}

.denied {
    color: red;
    text-shadow: 0 0 10px red;
}

.granted {
    color: #00ff9f;
    text-shadow: 0 0 10px #00ff9f;
}

@keyframes flicker {
    0% { opacity: 1; }
    50% { opacity: 0.4; }
    100% { opacity: 1; }
}

.flicker {
    animation: flicker 0.2s infinite;
}

</style>
</head>
<body><div class="terminal">
    <h1>TERMINAL</h1>
    <input type="password" id="codeInput" placeholder="ENTER ACCESS CODE" />
    <div class="message" id="message"></div>
</div>
    <audio id="deniedSound" src="accessdenied.mp3"></audio>
<audio id="grantedSound" src="accessgranted.mp3"></audio>

<script>
const correctCode = "0000";

const input = document.getElementById("codeInput");
const message = document.getElementById("message");
const deniedSound = document.getElementById("deniedSound");
const grantedSound = document.getElementById("grantedSound");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        checkCode();
    }
});

function checkCode() {
    if (input.value === correctCode) {
        message.textContent = "ACCESS GRANTED";
        message.className = "message granted flicker";
        grantedSound.play();

        setTimeout(() => {
            window.location.href = "https://unkn0wn-sh4d0w.github.io/-/user/";
        }, 3000);

    } else {
        message.textContent = "ACCESS DENIED";
        message.className = "message denied flicker";
        deniedSound.play();

        
        setTimeout(() => {
            window.location.href = "https://unkn0wn-sh4d0w.github.io/-/404";
        }, 3000);

        input.value = "";
    }
}
</script></body>
</html>
