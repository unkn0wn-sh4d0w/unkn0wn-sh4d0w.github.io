<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title></title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: monospace;
    background: black;
    color: #00ff66;
    overflow: hidden;
}

canvas {
    position: fixed;
    top: 0;
    left: 0;
    z-index: -2;
}

.card {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(1);

    max-width: 90%;
    width: 340px;
    padding: 20px;

    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(10px);

    border-radius: 20px;
    border: 1px solid rgba(0,255,102,0.2);

    text-align: center;

    box-shadow: 0 0 25px rgba(0,255,102,0.15);
    opacity: 0;

    animation: fadeIn 1.5s ease forwards, float 5s ease-in-out infinite;
}

.pfp {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 2px solid #00ff66;
    margin-bottom: 12px;
}

.name-container {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: -10px;
}

.name-gif-wrapper {
    position: relative;
    display: inline-block;
    cursor: default;
}

.name-gif-wrapper::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: rgba(0,0,0,0.9);
    color: #00ff66;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}

.name-gif-wrapper:hover::after {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

.name-gif {
    width: 24px;
    height: 24px;
}

.name {
    font-size: 22px;
    font-weight: normal;
    color: #00ff66;
}

.role-badge img {
    width: 25px;
    height: 25px;
    object-fit: contain;
    display: block;
}

.role-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 8px;
    cursor: default;
    margin-bottom: 12px;
    position: relative;
    transition: 0.2s;
}

.role-badge::after {
    content: attr(data-tooltip);
    position: absolute;
    bottom: 125%;
    left: 50%;
    transform: translateX(-50%) scale(0.9);
    background: rgba(0,0,0,0.9);
    color: #00ff66;
    padding: 5px 8px;
    border-radius: 6px;
    font-size: 11px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
}

.role-badge:hover::after {
    opacity: 1;
    transform: translateX(-50%) scale(1);
}

.desc {
    font-size: 14px;
    color: #00ff66;
    opacity: 0.85;
    line-height: 1.4;
    margin-top: 4px;
}

@keyframes fadeIn {
    to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

@keyframes float {
    0%,100% { transform: translate(-50%, -50%) translateY(0); }
    50% { transform: translate(-50%, -50%) translateY(-8px); }
}
</style>
</head>
<body style="background:black;">
<canvas id="matrix"></canvas>

<div class="card">
    <img class="pfp" src="https://cdn.discordapp.com/avatars/1420110702516899910/e780ec2241784db6e02497fc75693a43.png?size=1024" alt="pfp">

    <div class="name-container">
        <div class="name">Sh4d0w</div>
        <div class="name-gif-wrapper" data-tooltip="Owner">
            <img class="name-gif" src="https://cdn3.emoji.gg/emojis/905668-crown.gif" alt="GIF">
        </div>
    </div>

    <div class="role-badge" data-tooltip="Owner"></div>

    <div class="desc">
        WOW!<br>
        You found me...<br><br>
        Send me an Screenshot from this Website:<br>
        Discord =
        @omg.skyeee
    </div>
</div>

<script>
const canvas = document.getElementById("matrix");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener("resize", resizeCanvas);
resizeCanvas();

const mango = new Image();
mango.src = "https://em-content.zobj.net/source/apple/453/mango_1f96d.png";

const fontSize = 41;
const columns = Math.floor(canvas.width / fontSize);
const drops = Array(columns).fill(0);

function draw() {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    for (let i = 0; i < drops.length; i++) {
        ctx.drawImage(mango, i * fontSize, drops[i] * fontSize, fontSize, fontSize);

        if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
            drops[i] = 0;
        }

        drops[i]++;
    }
}

mango.onload = () => {
    setInterval(draw, 50);
};
</script>

</body>
</html>
