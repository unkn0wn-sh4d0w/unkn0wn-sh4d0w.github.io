<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}

.container{
width:100%;
max-width:820px;
background:#1c1c1c;
padding:14px;
border-radius:12px;
box-sizing:border-box;
}

h2{text-align:center;margin:6px 0;}

.tabs{
display:flex;
gap:6px;
margin-bottom:10px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
background:#2a2a2a;
cursor:pointer;
user-select:none;
}

.tab.active{background:#5865F2;}

.section{display:none;}
.section.active{display:block;}

input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:#fff;
outline:none;
box-sizing:border-box;
font-size:14px;
}

textarea{resize:none;height:80px;}

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#5865F2;
color:#fff;
font-weight:bold;
cursor:pointer;
}

button:active{transform:scale(0.98);}

.box{
background:#151515;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.btn-row,.field-row{
background:#202020;
padding:10px;
border-radius:10px;
margin-bottom:8px;
display:flex;
flex-direction:column;
gap:6px;
}

.btn-top,.field-top{
display:flex;
gap:8px;
}

.delete-btn{
background:#ed4245;
border:none;
color:#fff;
padding:10px;
border-radius:8px;
width:60px;
cursor:pointer;
}

.add-btn{
background:#333;
padding:12px;
text-align:center;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}

.jsonBox{
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.status{
text-align:center;
margin-top:10px;
min-height:18px;
}

.success{color:#3ba55d;}
.error{color:#ed4245;}
.info{color:#faa61a;}
</style>
</head>
<body>

<div class="container">
<h2>Webhook Builder</h2>

<div class="box">
<input id="webhook" placeholder="Webhook URL">
<input id="username" placeholder="Username">
<input id="avatar" placeholder="Avatar URL">
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('message')">Message</div>
<div class="tab" onclick="switchTab('embed')">Embed</div>
</div>

<!-- MESSAGE -->
<div id="message" class="section active">

<div class="box">
<textarea id="content" placeholder="Message content"></textarea>
</div>

<div class="box">
<h3 style="margin:0;font-size:14px;">Buttons</h3>
<div id="buttons_msg"></div>
<div class="add-btn" onclick="addButton('msg')">+ Add Button</div>
</div>

</div>

<!-- EMBED -->
<div id="embed" class="section">

<div class="box">
<input id="title" placeholder="Embed Title">
<textarea id="desc" placeholder="Embed Description"></textarea>
<input id="author" placeholder="Author">
<input id="footer" placeholder="Footer">
<input id="color" placeholder="Color HEX">
</div>

<div class="box">
<h3 style="margin:0;font-size:14px;">Fields</h3>
<div id="fields"></div>
<div class="add-btn" onclick="addField()">+ Add Field</div>
</div>

<div class="box">
<h3 style="margin:0;font-size:14px;">Buttons</h3>
<div id="buttons_embed"></div>
<div class="add-btn" onclick="addButton('embed')">+ Add Button</div>
</div>

</div>

<!-- JSON EDITOR -->
<div class="jsonBox">
<h3 style="margin:0 0 8px 0;font-size:14px;">JSON (editable)</h3>
<textarea id="jsonEditor" style="height:200px;"></textarea>
</div>

<button onclick="send()">Send Webhook</button>

<div class="status" id="status"></div>

</div>

<script>
let tab="message";

function switchTab(t){
tab=t;

document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".section").forEach(e=>e.classList.remove("active"));

document.querySelectorAll(".tab")[t==="message"?0:1].classList.add("active");
document.getElementById(t).classList.add("active");

update();
}

function setStatus(t,c){
const el=document.getElementById("status");
el.textContent=t;
el.className="status "+c;
}

/* BUTTONS */
function addButton(type){
const c=document.getElementById(type==="msg"?"buttons_msg":"buttons_embed");

if(c.children.length>=5){
setStatus("Max 5 buttons","error");
return;
}

const r=document.createElement("div");
r.className="btn-row";

r.innerHTML=`
<div class="btn-top">
<input placeholder="Label">
<input placeholder="URL">
<select>
<option value="5">Link</option>
<option value="1">Primary</option>
<option value="2">Secondary</option>
<option value="3">Success</option>
<option value="4">Danger</option>
</select>
</div>
<button class="delete-btn" onclick="this.parentElement.remove();update()">X</button>
`;

c.appendChild(r);
update();
}

/* FIELDS */
function addField(){
const c=document.getElementById("fields");

const r=document.createElement("div");
r.className="field-row";

r.innerHTML=`
<div class="field-top">
<input placeholder="Name">
<input placeholder="Value">
</div>
<div>
<label style="font-size:12px;color:#aaa;">
<input type="checkbox"> Inline
</label>
</div>
<button class="delete-btn" onclick="this.parentElement.remove();update()">X</button>
`;

c.appendChild(r);
update();
}

/* BUILD */
function build(){
let p={};

let username=document.getElementById("username").value.trim();
let avatar=document.getElementById("avatar").value.trim();

if(username) p.username=username;
if(avatar) p.avatar_url=avatar;

let content=document.getElementById("content").value.trim();
if(content) p.content=content;

/* EMBED */
let e={};

let title=document.getElementById("title").value.trim();
let desc=document.getElementById("desc").value.trim();
let author=document.getElementById("author").value.trim();
let footer=document.getElementById("footer").value.trim();
let color=document.getElementById("color").value.trim();

if(title) e.title=title;
if(desc) e.description=desc.replace(/\\n/g,"\n");
if(author) e.author={name:author};
if(footer) e.footer={text:footer};
if(color) e.color=parseInt(color.replace("#",""),16)||0x5865F2;

/* FIELDS */
let fields=[];
document.querySelectorAll("#fields .field-row").forEach(r=>{
let i=r.querySelectorAll("input");
let n=i[0].value.trim();
let v=i[1].value.trim();
let inl=i[2].checked;

if(n&&v) fields.push({name:n,value:v,inline:inl});
});

if(fields.length) e.fields=fields;

if(title||desc||fields.length||author||footer||color){
p.embeds=[e];
}

/* BUTTONS */
let btns=[];
document.querySelectorAll(".btn-row").forEach(r=>{
let i=r.querySelectorAll("input,select");
let label=i[0].value.trim();
let url=i[1].value.trim();
let style=parseInt(i[2].value);

if(!label||!url) return;

try{new URL(url);}catch{return;}

btns.push({
type:2,
style:style,
label:label,
url:style===5?url:undefined
});
});

if(btns.length){
p.components=[{type:1,components:btns.slice(0,5)}];
}

return p;
}

/* JSON SYNC */
function update(){
let data=build();
document.getElementById("jsonEditor").value=
JSON.stringify(data,null,2);
}

document.getElementById("jsonEditor").addEventListener("input",()=>{
try{
let json=JSON.parse(document.getElementById("jsonEditor").value);
applyJSON(json);
}catch{}
});

function applyJSON(j){
document.getElementById("content").value=j.content||"";
document.getElementById("username").value=j.username||"";
document.getElementById("avatar").value=j.avatar_url||"";
}

/* SEND */
async function send(){
const url=document.getElementById("webhook").value.trim();
if(!url) return setStatus("Webhook required","error");

setStatus("Sending...","info");

try{
let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(build())
});

if(res.ok) setStatus("Sent!","success");
else setStatus("Failed","error");
}catch{
setStatus("Network error","error");
}
}

/* INIT */
update();
</script>

</body>
</html>
