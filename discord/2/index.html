<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#0f0f0f;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
}
.container{
width:100%;
max-width:820px;
background:#1c1c1c;
padding:14px;
border-radius:12px;
box-sizing:border-box;
}
h2{text-align:center;margin:6px 0;}
.tabs{display:flex;gap:6px;margin-bottom:10px;}
.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
background:#2a2a2a;
cursor:pointer;
user-select:none;
}
.tab.active{background:#5865F2;}
.section{display:none;}
.section.active{display:block;}
input,textarea,select{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:10px;
background:#2a2a2a;
color:#fff;
outline:none;
box-sizing:border-box;
font-size:14px;
}
textarea{resize:none;height:80px;}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#5865F2;
color:#fff;
font-weight:bold;
cursor:pointer;
}
button:active{transform:scale(0.98);}
.box{
background:#151515;
padding:10px;
border-radius:10px;
margin-top:10px;
}
.btn-row,.field-row{
background:#202020;
padding:10px;
border-radius:10px;
margin-bottom:8px;
display:flex;
flex-direction:column;
gap:6px;
}
.btn-top,.field-top{
display:flex;
gap:8px;
}
.delete-btn{
background:#ed4245;
border:none;
color:#fff;
padding:10px;
border-radius:8px;
width:60px;
cursor:pointer;
}
.add-btn{
background:#333;
padding:12px;
text-align:center;
border-radius:10px;
margin-top:8px;
cursor:pointer;
}
.jsonBox{
background:#111;
padding:10px;
border-radius:10px;
margin-top:10px;
}
.status{
text-align:center;
margin-top:10px;
min-height:18px;
}
.success{color:#3ba55d;}
.error{color:#ed4245;}
.info{color:#faa61a;}
</style>
</head>
<body>

<div class="container">
<h2>Webhook Builder</h2>

<div class="box">
<input id="webhook" placeholder="Webhook URL">
<input id="username" placeholder="Username (Optional)">
<input id="avatar" placeholder="Avatar URL (Optional)">
</div>

<div class="tabs">
<div class="tab active" onclick="switchTab('message')">Message</div>
<div class="tab" onclick="switchTab('embed')">Embed</div>
</div>

<div id="message" class="section active">
<div class="box">
<textarea id="content" placeholder="Message content"></textarea>
</div>
</div>

<div id="embed" class="section">
<div class="box">
<input id="title" placeholder="Embed Title">
<textarea id="desc" placeholder="Embed Description"></textarea>
<input id="author" placeholder="Author">
<input id="footer" placeholder="Footer">
<input id="color" placeholder="Color HEX">
</div>

<div class="box">
<h3 style="margin:0;font-size:14px;">Fields</h3>
<div id="fields"></div>
<div class="add-btn" onclick="addField()">+ Add Field</div>
</div>
</div>

<div class="box">
<h3 style="margin:0;font-size:14px;">Buttons (Link only)</h3>
<div id="buttons"></div>
<div class="add-btn" onclick="addButton()">+ Add Button</div>
</div>

<div class="jsonBox">
<h3 style="margin:0 0 8px 0;font-size:14px;">JSON Preview & Editor</h3>
<textarea id="jsonEditor" style="height:200px;"></textarea>
</div>

<button onclick="send()">Send Webhook</button>
<div class="status" id="status"></div>
</div>

<script>
let debounce;
let lock=false;

function switchTab(t){
document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".section").forEach(e=>e.classList.remove("active"));
document.querySelectorAll(".tab")[t==="message"?0:1].classList.add("active");
document.getElementById(t).classList.add("active");
update();
}

function setStatus(t,c){
const el=document.getElementById("status");
el.textContent=t;
el.className="status "+c;
}

function triggerUpdate(){
clearTimeout(debounce);
debounce=setTimeout(update,120);
}

document.querySelectorAll("input,textarea").forEach(el=>{
el.addEventListener("input",triggerUpdate);
});

function addButton(data={}){
const c=document.getElementById("buttons");

if(c.children.length>=5){
setStatus("Max 5 buttons","error");
return;
}

const r=document.createElement("div");
r.className="btn-row";

r.innerHTML=`
<div class="btn-top">
<input placeholder="Label" value="${data.label||""}">
<input placeholder="URL" value="${data.url||""}">
</div>
<button class="delete-btn">X</button>
`;

r.querySelectorAll("input").forEach(i=>i.addEventListener("input",triggerUpdate));
r.querySelector(".delete-btn").onclick=()=>{r.remove();triggerUpdate();};

c.appendChild(r);
triggerUpdate();
}

function addField(data={}){
const c=document.getElementById("fields");

const r=document.createElement("div");
r.className="field-row";

r.innerHTML=`
<div class="field-top">
<input placeholder="Name" value="${data.name||""}">
<input placeholder="Value" value="${data.value||""}">
</div>
<label style="font-size:12px;color:#aaa;">
<input type="checkbox" ${data.inline?"checked":""}> Inline
</label>
<button class="delete-btn">X</button>
`;

r.querySelectorAll("input").forEach(i=>i.addEventListener("input",triggerUpdate));
r.querySelector(".delete-btn").onclick=()=>{r.remove();triggerUpdate();};

c.appendChild(r);
triggerUpdate();
}

function build(){
let p={};

if(username.value) p.username=username.value;
if(avatar.value) p.avatar_url=avatar.value;
if(content.value) p.content=content.value;

let e={};

if(title.value) e.title=title.value;
if(desc.value) e.description=desc.value.replace(/\\n/g,"\n");
if(author.value) e.author={name:author.value};
if(footer.value) e.footer={text:footer.value};
if(color.value) e.color=parseInt(color.value.replace("#",""),16)||0x5865F2;

let fields=[];
document.querySelectorAll("#fields .field-row").forEach(r=>{
let i=r.querySelectorAll("input");
if(i[0].value && i[1].value){
fields.push({
name:i[0].value,
value:i[1].value,
inline:i[2].checked
});
}
});
if(fields.length) e.fields=fields;

if(Object.keys(e).length) p.embeds=[e];

let btns=[];
document.querySelectorAll("#buttons .btn-row").forEach(r=>{
let i=r.querySelectorAll("input");
if(!i[0].value||!i[1].value) return;

try{new URL(i[1].value);}catch{return;}

btns.push({
type:2,
style:5,
label:i[0].value,
url:i[1].value
});
});

if(btns.length){
p.components=[{type:1,components:btns.slice(0,5)}];
}

return p;
}

function update(){
if(lock) return;
jsonEditor.value=JSON.stringify(build(),null,2);
}

jsonEditor.addEventListener("input",()=>{
try{
lock=true;
let j=JSON.parse(jsonEditor.value);
content.value=j.content||"";
username.value=j.username||"";
avatar.value=j.avatar_url||"";
lock=false;
setStatus("JSON synced","success");
}catch{
setStatus("Invalid JSON","error");
}
});

async function send(){
const url=webhook.value.trim();
if(!url) return setStatus("Webhook required","error");

let payload=build();

if(!payload.content && !payload.embeds){
return setStatus("Add content or embed","error");
}

setStatus("Sending...","info");

try{
let res=await fetch(url,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});

let text=await res.text();

if(res.ok){
setStatus("Sent!","success");
}else{
console.error(text);
setStatus("Failed: "+text,"error");
}
}catch(err){
console.error(err);
setStatus("Network error","error");
}
}

update();
</script>

</body>
</html>
