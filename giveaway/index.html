<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Daily Giveaway</title>
<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, red,black,red);
  color: white;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

.container {
  max-width: 500px;
  width: 90%;
  background: rgba(0,0,0,0.75);
  border-radius: 20px;
  padding: 40px 30px;
  text-align: center;
  position: relative;
}

h1 {
  font-size: 2.5em;
  margin-bottom: 15px;
  color: red;}

.card {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.3);
  border-radius: 20px;
  padding: 40px;
  font-size: 1.5em;
  font-weight: bold;
  width: 100%;
  max-width: 400px;
  margin: 0 auto;
  transition: transform 0.7s, opacity 0.7s;
  position: absolute;
  left: 50%;
  top: 0;
  transform: translateX(-50%);
  opacity: 0
}

.card.active {
  opacity: 1;
  transform: translateX(-50%) scale(1.05);
}
</style>
</head>
<body>
