<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Game</title>
<style>
body {
  font-family: Arial;
  background: #050505;
  color: #eee;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px;
}h1 { margin-bottom: 10px; }

input { padding: 14px; width: 420px; font-size: 16px; border-radius: 12px; border: none; outline: none; background: #111; color: #fff; }

.rules { margin-top: 20px; width: 450px; }

.rule { padding: 10px; margin: 6px 0; border-radius: 8px; background: #222; opacity: 0.4; transition: 0.3s; }

.rule.active { opacity: 1; } .rule.valid { background: #1e7e34; } .rule.invalid { background: #7e1e1e; }

#progress { margin-top: 10px; } #win { margin-top: 20px; color: #00ff88; display: none; } </style>

</head>
<body><h1>AI Password Game</h1>
<input id="password" placeholder="Enter password...">
<div id="progress"></div>
<div class="rules" id="rules"></div>
<div id="win"></div><script>
const pool = [
 // EASY
 {t:"Length ≥ 6", c:p=>p.length>=6},
 {t:"Contains number", c:p=>/\d/.test(p)},
 {t:"Contains uppercase", c:p=>/[A-Z]/.test(p)},
 {t:"Contains lowercase", c:p=>/[a-z]/.test(p)},
 {t:"Contains symbol", c:p=>/[^A-Za-z0-9]/.test(p)},
 {t:"Starts with letter", c:p=>/^[A-Za-z]/.test(p)},
 {t:"Ends with digit", c:p=>/\d$/.test(p)},
 {t:"Contains 42", c:p=>p.includes('42')},
 {t:"Contains 'AI'", c:p=>p.includes('AI')},
 {t:"No spaces", c:p=>!/\s/.test(p)},

 // MEDIUM
 {t:"At least 3 digits", c:p=>(p.match(/\d/g)||[]).length>=3},
 {t:"Even length", c:p=>p.length%2===0},
 {t:"Contains emoji 😀", c:p=>/[\u{1F600}-\u{1F64F}]/u.test(p)},
 {t:"Contains month", c:p=>/(march|may|july)/i.test(p)},
 {t:"Contains weekday", c:p=>/(monday|friday)/i.test(p)},
 {t:"Contains roman numeral", c:p=>/[IVX]/.test(p)},
 {t:"Unique chars ≥ 10", c:p=>new Set(p).size>=10},
 {t:"Contains 1337", c:p=>p.includes('1337')},
 {t:"Contains an Palindrome Pair", c:p=>/(.)\1/.test(p)},
 {t:"Length divisible by 3", c:p=>p.length%3===0},

 // HARD
 {t:"Contains binary 1010", c:p=>p.includes('1010')},
 {t:"Contains 'dead'", c:p=>p.includes('dead')},
 {t:"Contains '??'", c:p=>p.includes('??')},
 {t:"Contains ☃", c:p=>p.includes('☃')},
 {t:"No letter e", c:p=>!/e/i.test(p)},
 {t:"Contains 'XY'", c:p=>p.includes('XY')},
 {t:"Contains first 4 Digits from the Fibonacci Sequence", c:p=>p.includes('1123')},
 {t:"Contains 777", c:p=>p.includes('777')},
 {t:"Exactly 2 uppercase in a row", c:p=>/[A-Z]{2}/.test(p)},
 {t:"At least 4 vowels", c:p=>(p.match(/[aeiou]/gi)||[]).length>=4},

 // EXTRA HARD
 {t:"Length is prime", c:p=>{let l=p.length;if(l<2)return false;for(let i=2;i<l;i++)if(l%i===0)return false;return true;}},
 {t:"Start = end", c:p=>p[0]===p[p.length-1]},
 {t:"Exactly 5 vowels", c:p=>(p.match(/[aeiou]/gi)||[]).length===5},
 {t:"Contains 'NaN'", c:p=>p.includes('NaN')},
 {t:"Contains alternating case", c:p=>/[a-z][A-Z]|[A-Z][a-z]/.test(p)}
];

function createDigitSumRule(){
 let target = Math.floor(Math.random()*10)+18;
 return {
  t:"Digit sum = "+target,
  c:p=>(p.match(/\d/g)||[]).reduce((a,b)=>a+ +b,0)===target
 };
}

function generateRules(){
 let selected = [];
 let shuffled = shuffle([...pool]);

 for(let r of shuffled){
  if(selected.length >= 19) break;
  selected.push(r);
 }

 selected.push(createDigitSumRule());

 return shuffle(selected);
}

function shuffle(arr){
 return arr.sort(()=>Math.random()-0.5);
}

const rules = generateRules();

const container = document.getElementById("rules");

rules.forEach((r,i)=>{
 let d=document.createElement("div");
 d.className="rule";
 d.id="rule-"+i;
 d.innerText="Rule "+(i+1)+": "+r.t;
 container.appendChild(d);
});

const input = document.getElementById("password");
const progress = document.getElementById("progress");
const win = document.getElementById("win");

let unlocked = 1;

input.addEventListener("input", ()=>{
 let val = input.value;
 let passed = 0;

 rules.forEach((r,i)=>{
  let el = document.getElementById("rule-"+i);

  if(i < unlocked){
    el.classList.add("active");
    let ok = r.c(val);

    el.classList.toggle("valid", ok);
    el.classList.toggle("invalid", !ok);

    if(ok){
      passed++;
      if(i === unlocked-1 && unlocked < rules.length){
        unlocked++;
      }
    }
  }
 });

 progress.innerText = passed + " / " + rules.length;

 if(passed === rules.length){
  win.style.display="block";
  win.innerText="You succsefully created an new Password.";
 }
});
</script></body>
</html>
