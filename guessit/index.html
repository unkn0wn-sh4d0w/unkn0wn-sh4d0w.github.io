<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎯 GuessIt</title>

<style>
  body{
    font-family: Arial, sans-serif;
    text-align:center;
    margin-top:100px;
    background:#111;
    color:white;
  }

  button{
    padding:15px 30px;
    margin:15px;
    font-size:18px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    transition:0.2s;
  }

  .easy{background:#2ecc71;}
  .medium{background:#f1c40f;}
  .hard{background:#e74c3c;}

  button:hover{
    transform:scale(1.1);
  }
</style>
</head>

<body>

<h1>Select Difficulty</h1>

<button class="easy" onclick="openPage('easy')">Easy</button>
<button class="medium" onclick="openPage('medium')">Medium</button>
<button class="hard" onclick="openPage('hard')">Hard</button>

<script>
function openPage(level){
  window.open("https://unkn0wn-sh4d0w.github.io/guessit/" + level, "_blank");
}
</script>

</body>
</html>
