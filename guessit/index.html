<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guess The Code</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
font-family:Arial;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
margin:0;
overflow:hidden;
}

.box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
border-radius:20px;
padding:50px;
width:90%;
max-width:420px;
text-align:center;
box-shadow:0 0 30px rgba(0,0,0,0.6);
}

input{
padding:16px;
width:85%;
margin-top:12px;
border-radius:8px;
border:none;
font-size:18px;
}

button{
padding:16px 30px;
margin-top:18px;
border:none;
border-radius:8px;
background:#00ffb3;
color:black;
font-weight:bold;
font-size:18px;
cursor:pointer;
}

button:disabled{
background:#555;
cursor:not-allowed;
}

#msg{
margin-top:20px;
font-size:18px;
}

#counter{
margin-top:10px;
font-size:14px;
opacity:0.8;
}

#cooldown{
margin-top:5px;
font-size:14px;
color:#ffcc00;
}

.confetti{
position:fixed;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(110vh) rotate(720deg);
}
}
</style>

</head>
<body>

<div class="box">

<h2>🎯 Guess the Code</h2>
<p>Pick a number between <b>0 – 9999</b></p>

<input id="guess" type="number" min="0" max="9999" placeholder="Your guess">

<br>

<input id="override" placeholder="No Cooldown Code">

<br>

<button id="btn">Guess</button>

<p id="msg"></p>

<div id="cooldown"></div>

<div id="counter">Guesses: 0</div>

<div id="commitment"></div>

</div>

<script>

(async function(){

document.addEventListener("contextmenu",e=>e.preventDefault())

document.addEventListener("keydown",function(e){
if(
e.key==="F12" ||
(e.ctrlKey && e.shiftKey && e.key==="I") ||
(e.ctrlKey && e.shiftKey && e.key==="J") ||
(e.ctrlKey && e.key==="U")
){
e.preventDefault()
}
})

const encoder = new TextEncoder()

async function hash(text){
const buf = await crypto.subtle.digest(
"SHA-256",
encoder.encode(text)
)

return [...new Uint8Array(buf)]
.map(x=>x.toString(16).padStart(2,"0"))
.join("")
}

function randomString(len){
const chars="abcdefghijklmnopqrstuvwxyz0123456789"
let s=""
for(let i=0;i<len;i++)
s+=chars[Math.floor(Math.random()*chars.length)]
return s
}

const overrideCode = "Sh4d0w"

const secretNumber = Math.floor(Math.random()*10000)

const salt = randomString(16)

const secretHash = await hash(secretNumber + salt)

let guesses = 0
let cooldown = false
let bypass = false

document.getElementById("btn").onclick = async function(){

const overrideInput =
document.getElementById("override").value

if(overrideInput === overrideCode)
bypass = true

if(cooldown && !bypass) return

const guess =
document.getElementById("guess").value

if(guess === "" || guess < 0 || guess > 9999){
document.getElementById("msg").innerText =
"Enter a number between 0 and 9999."
return
}

guesses++

document.getElementById("counter").innerText =
"Guesses: " + guesses

document.getElementById("commitment").innerText =
"Token: " + secretHash

const guessHash = await hash(guess + salt)

if(guessHash === secretHash){

document.getElementById("msg").innerHTML =
"You guessed the Code! 🎉<br><br>" +
"Secret Number: " + secretNumber + "<br>" +
"ID (Salt): " + salt

confetti()

}else{

document.getElementById("msg").innerText =
"Wrong code. Try again!"

if(!bypass)
startCooldown()

}

}

function startCooldown(){

cooldown = true

const btn = document.getElementById("btn")

btn.disabled = true

let time = 3

document.getElementById("cooldown").innerText =
"Wait " + time + " seconds..."

const timer = setInterval(()=>{

time--

document.getElementById("cooldown").innerText =
"Wait " + time + " seconds..."

if(time <= 0){

clearInterval(timer)

cooldown = false
btn.disabled = false

document.getElementById("cooldown").innerText=""

}

},1000)

}

function confetti(){

for(let i=0;i<120;i++){

const piece=document.createElement("div")

piece.className="confetti"

piece.style.left=Math.random()*100+"vw"

piece.style.background=
"hsl("+Math.random()*360+"deg,100%,50%)"

piece.style.animationDuration=
(Math.random()*3+2)+"s"

document.body.appendChild(piece)

setTimeout(()=>piece.remove(),5000)

}

}

})()

</script>

</body>
</html>
