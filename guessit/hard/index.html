<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>🎯 GuessIt - Hard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial, sans-serif;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  color:white;
  margin:0;
  overflow:hidden;
}

.commitment{
  margin:15px auto;
  font-size:12px;
  opacity:0.7;
  text-align:center;
  white-space:pre;

  background:rgba(0,0,0,0.2);
  padding:10px 15px;
  border-radius:12px;

  display:block;
  width:fit-content;
  max-width:100%;
}

.box{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  border-radius:20px;
  padding:50px;
  width:90%;
  max-width:420px;
  text-align:center;
  box-shadow:0 0 30px rgba(0,0,0,0.6);
}

input{
  padding:16px;
  width:85%;
  margin-top:12px;
  border-radius:8px;
  border:none;
  font-size:18px;
}

button{
  padding:16px 30px;
  margin-top:18px;
  border:none;
  border-radius:8px;
  background:#00ffb3;
  color:black;
  font-weight:bold;
  font-size:18px;
  cursor:pointer;
}

.leaderboard-btn{
  position:fixed;
  top:20px;
  right:20px;

  width:50px;
  height:50px;

  border:none;
  border-radius:12px;

  background:#00ffb3;
  color:black;

  display:flex;
  align-items:center;
  justify-content:center;

  font-size:24px;
  line-height:1;

  cursor:pointer;
  box-shadow:0 0 10px rgba(0,0,0,0.5);

  padding:0;
}

button:disabled{
  background:#555;
  cursor:not-allowed;
}

#msg{
  margin-top:20px;
  font-size:18px;
}

#counter{
  margin-top:10px;
  font-size:14px;
  opacity:0.8;
}

#cooldown{
  margin-top:5px;
  font-size:14px;
  color:#ffcc00;
}

.leaderboard-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border:none;
  border-radius:12px;
  background:#00ffb3;
  color:black;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
  cursor:pointer;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
  padding:0;
}

.leaderboard-btn:hover{
  transform:scale(1.1);
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.popup-content{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(10px);
  padding:30px;
  border-radius:20px;
  width:380px;
  max-width:90%;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.6);
}

.leaderboard-table{
  width:100%;
  margin-top:10px;
}

.leader{
  display:grid;
  grid-template-columns:60px 1fr 130px 60px;
  padding:8px;
  border-radius:8px;
  margin:4px 0;
  font-weight:bold;
  font-size:14px;
  align-items:center;
}

.header{
  background:rgba(255,255,255,0.15);
  font-size:13px;
}

.gold{
  background:linear-gradient(90deg,#ffd700,#ffb700);
  color:black;
}

.silver{
  background:linear-gradient(90deg,#c0c0c0,#e0e0e0);
  color:black;
}

.bronze{
  background:linear-gradient(90deg,#cd7f32,#e6a15c);
  color:black;
}

.normal{
  background:rgba(255,255,255,0.08);
}

.confetti{
  position:fixed;
  width:10px;
  height:10px;
  top:-10px;
  animation:fall linear forwards;
}

@keyframes fall{
  to{
    transform:translateY(110vh) rotate(720deg);
  }
}

.version{
  position:fixed;
  bottom:10px;
  right:10px;
  font-size:12px;
  opacity:0.5;
}
</style>
</head>

<body>
<button class="leaderboard-btn" onclick="openLeaderboard()">🏆</button>
  <div class="box">
<h2>🎯 Guess the Code - Hard</h2>
<p>Pick a number between <b>0 – 99999</b></p>

<input id="guess" type="number" min="0" max="99999" placeholder="Your guess">
<br>
<button id="btn">Guess</button>

<p id="msg"></p>
<div id="cooldown"></div>
<div id="counter">Guesses: 0</div>
<div class="commitment"></div>
<div class="version">v1.6</div>
</div>
<div id="leaderboardPopup" class="popup">
  <div class="popup-content">

    <h2>🏆 Leaderboard</h2>

    <div class="leaderboard-table">

      <div class="leader header">
        <span>Place</span>
        <span>Name</span>
        <span>Avg. Guesses</span>
        <span>Wins</span>
      </div>

      <div class="leader gold">
        <span>1.</span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="leader silver">
        <span>2.</span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="leader bronze">
        <span>3.</span>
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="leader normal">
        <span>4.</span>
        <span></span>
        <span></span>
        <span></span>
      </div>

    </div>

    <br>
    <button onclick="closeLeaderboard()">Close</button>

  </div>
</div>
<script>
(async function(){

document.addEventListener("contextmenu", e=>e.preventDefault());
document.addEventListener("keydown", e=>{
    if(e.key==="F12" || (e.ctrlKey && e.shiftKey && (e.key==="I"||e.key==="J")) || (e.ctrlKey && e.key==="U")){
        e.preventDefault();
    }
});

const encoder = new TextEncoder();
async function hash(text){
    const buf = await crypto.subtle.digest("SHA-256", encoder.encode(text));
    return [...new Uint8Array(buf)].map(x=>x.toString(16).padStart(2,"0")).join("");
}

function randomString(len){
    const chars="abcdefghijklmnopqrstuvwxyz0123456789";
    let s="";
    for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)];
    return s;
}

const secretNumber = Math.floor(Math.random()*100000);
const salt = randomString(16);
const secretHash = await hash(secretNumber + salt);

document.querySelector(".commitment").innerText = "Token:\n" + secretHash;

let guesses = 0;
let cooldown = false;

let guessTimes = [];
  document.getElementById("btn").onclick = async function(){
    const now = Date.now();
    guessTimes.push(now);
    guessTimes = guessTimes.filter(t => now - t <= 3000);
    if(guessTimes.length >= 5){
        alert("Too many guesses! Reloading...");
        location.reload();
        return;
    }
    if(cooldown) return;
    const guessInput = document.getElementById("guess").value;
    const guess = Number(guessInput);

    if(guessInput === "" || isNaN(guess) || guess < 0 || guess > 99999){
        document.getElementById("msg").innerText = "Enter a number between 0 and 99999.";
        return; 
    }

    guesses++;
    document.getElementById("counter").innerText = "Guesses: " + guesses;

    const guessHash = await hash(guess + salt);

    if(guessHash === secretHash){
        document.getElementById("msg").innerHTML = "You guessed the Code! 🎉<br><br>" +
            "Secret Number: " + secretNumber + "<br>ID (Salt): " + salt;
        confetti();
    } else {
        document.getElementById("msg").innerText = "Wrong code. Try again!";
        startCooldown();
    }
}

function startCooldown(){
    cooldown = true;
    const btn = document.getElementById("btn");
    btn.disabled = true;

    let time = 3;
    document.getElementById("cooldown").innerText = "Wait " + time + " seconds...";
    const timer = setInterval(()=>{
        time--;
        document.getElementById("cooldown").innerText = time>0 ? "Wait " + time + " seconds..." : "";
        if(time<=0){ 
            clearInterval(timer); 
            cooldown=false; 
            btn.disabled=false; 
        }
    },1000);
}

function confetti(){
    for(let i=0;i<120;i++){
        const piece=document.createElement("div");
        piece.className="confetti";
        piece.style.left=Math.random()*100+"vw";
        piece.style.background="hsl("+Math.random()*360+"deg,100%,50%)";
        piece.style.animationDuration=(Math.random()*3+2)+"s";
        document.body.appendChild(piece);
        setTimeout(()=>piece.remove(),5000);
    }
}

})();
  
function openLeaderboard(){
  document.getElementById("leaderboardPopup").style.display="flex";
}

function closeLeaderboard(){
  document.getElementById("leaderboardPopup").style.display="none";
}
</script>
</body>
</html>
