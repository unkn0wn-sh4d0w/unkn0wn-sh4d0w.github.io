<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Chatroom</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #1e1e2f;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}

h1 {
  margin-top: 20px;
  color: #f0f0f0;
}

#chat {
  width: 500px;
  height: 400px;
  border: 1px solid #444;
  margin: 20px auto;
  overflow-y: auto;
  padding: 10px;
  text-align: left;
  background: #2a2a40;
  border-radius: 8px;
}

input {
  padding: 8px;
  margin: 5px;
  border-radius: 4px;
  border: 1px solid #555;
  width: 200px;
}

button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 4px;
  border: none;
  background: #4b6ef6;
  color: white;
  cursor: pointer;
}

button:hover {
  background: #3a54c1;
}
</style>

</head>
<body>

<h1>Chatroom</h1>

<div id="chat"></div>

<input id="msg" placeholder="Type your message...">
<button onclick="send()">Send</button>

<br><br>
<button onclick="adminLogin()">Admin Login</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// ==== SUPABASE SETUP ====
const supabase = supabase.createClient(
  "https://txfjkoduiftbwcjnxipp.supabase.co",
  "YOUR_PUBLIC_ANON_KEY"
);

// ==== VARIABLES ====
let username = prompt("Enter your name") || "Guest";
let role = "user";
const chat = document.getElementById("chat");

// ==== ROLE BADGE ====
function badge(role){
  if(role=="owner") return "👑";
  if(role=="admin") return "🛡️";
  return "";
}

// ==== SCROLL CHAT ====
function scrollChat(){
  chat.scrollTop = chat.scrollHeight;
}

// ==== LOAD MESSAGES ====
async function loadMessages(){
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if(error){ console.error(error); return; }

  chat.innerHTML = "";
  data.forEach(m => {
    chat.innerHTML += `<p>${badge(m.role)} <b>${m.username}</b>: ${m.message}</p>`;
  });
  scrollChat();
}

loadMessages();

// ==== SEND MESSAGE ====
async function send(){
  let msg = document.getElementById("msg").value.trim();
  if(!msg) return;

  const { error } = await supabase.from("messages").insert({
    username: username,
    message: msg,
    role: role
  });

  if(error) return console.error(error);

  document.getElementById("msg").value = "";
  loadMessages();
}

// ==== ENTER KEY TO SEND ====
document.getElementById("msg").addEventListener("keydown", function(e){
  if(e.key === "Enter") send();
});

// ==== ADMIN LOGIN ====
async function adminLogin(){
  let user = prompt("Username");
  let pass = prompt("Password");
  if(!user || !pass) return alert("Username and Password required");

  const { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("username", user)
    .eq("password", pass)
    .maybeSingle(); // v2 uses maybeSingle instead of single

  if(error){ console.error(error); return alert("Error logging in"); }

  if(data){
    username = data.username;
    role = data.role;
    alert("Logged in as " + role);
  } else {
    alert("Wrong login");
  }
}

// ==== REALTIME SUBSCRIPTION ====
supabase.channel('chat')
  .on(
    'postgres_changes',
    { event:'INSERT', schema:'public', table:'messages' },
    payload => {
      const m = payload.new;
      chat.innerHTML += `<p>${badge(m.role)} <b>${m.username}</b>: ${m.message}</p>`;
      scrollChat();
    }
  )
  .subscribe();
</script>

</body>
</html>
