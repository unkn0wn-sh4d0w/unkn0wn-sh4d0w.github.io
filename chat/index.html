<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Live Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1f23;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      margin: 6px 0;
      padding: 8px 12px;
      border-radius: 10px;
      background: #2b2d31;
      display: inline-block;
      max-width: 70%;
      word-wrap: break-word;
    }

    .msg .user {
      font-weight: bold;
      color: #5865f2;
      margin-right: 6px;
    }

    #inputBox {
      display: flex;
      padding: 10px;
      background: #2b2d31;
    }

    #inputBox input {
      flex: 1;
      padding: 10px;
      border: none;
      outline: none;
      border-radius: 6px;
      background: #1e1f23;
      color: #fff;
    }

    #inputBox button {
      margin-left: 8px;
      padding: 10px 16px;
      background: #5865f2;
      border: none;
      border-radius: 6px;
      color: #fff;
      cursor: pointer;
    }

    #inputBox button:hover {
      background: #4753c1;
    }
  </style>
</head>
<body>
  <div id="chat"></div>
  <div id="inputBox">
    <input id="input" placeholder="Type a message..." />
    <button onclick="sendMessage()">Send</button>
  </div>

  <script>
    const API = "https://backend-kappa-rust-47.vercel.app/api";

    // --- Username setup ---
    let username = localStorage.getItem("username");
    let userId = localStorage.getItem("userid");

    if (!userId) {
      userId = crypto.randomUUID();
      localStorage.setItem("userid", userId);
    }

    function validName(name) {
      return name && name.length >= 2 && name.length <= 20;
    }

    if (!username) {
      while (!validName(username)) {
        username = prompt("What do you want to be called?");
      }
      localStorage.setItem("username", username);
    }

    // --- Render messages ---
    const chatDiv = document.getElementById("chat");

    function render(messages) {
      chatDiv.innerHTML = "";
      messages.forEach(m => {
        const div = document.createElement("div");
        div.classList.add("msg");
        div.innerHTML = `<span class="user">${m.user}</span>: ${m.text}`;
        chatDiv.appendChild(div);
      });
      chatDiv.scrollTop = chatDiv.scrollHeight;
    }

    // --- Send message ---
    async function sendMessage() {
      const input = document.getElementById("input");
      const text = input.value.trim();
      if (!text) return;

      try {
        await fetch(API + "/message", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ text, user: username, id: userId })
        });
      } catch (err) {
        console.error("Error sending message:", err);
      }

      input.value = "";
    }

    // --- Live chat ---
    const evt = new EventSource(API + "/live");
    evt.onmessage = (e) => {
      try {
        const data = JSON.parse(e.data).map(m => JSON.parse(m)).reverse();
        render(data);
      } catch (err) {
        console.error("Error parsing message:", err);
      }
    };
  </script>
</body>
</html>
