<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Chatroom</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #1e1e2f;
  color: white;
  text-align: center;
  margin: 0;
  padding: 0;
}
h1 {
  margin-top: 20px;
  color: #f0f0f0;
}
#chat {
  width: 500px;
  height: 400px;
  border: 1px solid #444;
  margin: 20px auto;
  overflow-y: auto;
  padding: 10px;
  text-align: left;
  background: #2a2a40;
  border-radius: 8px;
  display: none; /* hidden until login */
}
input {
  padding: 8px;
  margin: 5px;
  border-radius: 4px;
  border: 1px solid #555;
  width: 200px;
}
button {
  padding: 8px 12px;
  margin: 5px;
  border-radius: 4px;
  border: none;
  background: #4b6ef6;
  color: white;
  cursor: pointer;
}
button:hover {
  background: #3a54c1;
}
#login-form {
  margin-top: 50px;
}
</style>
</head>
<body>

<h1>Chatroom</h1>

<!-- Login/Register Form -->
<div id="login-form">
  <input id="username" placeholder="Username">
  <input id="password" placeholder="Password" type="password"><br>
  <button onclick="register()">Register</button>
  <button onclick="login()">Login</button><br><br>
  <button onclick="adminLogin()">Admin Login</button>
</div>

<!-- Chat Area -->
<div id="chat">
  <div id="chat-messages"></div>
  <input id="msg" placeholder="Type your message...">
  <button onclick="send()">Send</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script>
// ====== SUPABASE SETUP ======
const supabase = supabase.createClient(
  "https://txfjkoduiftbwcjnxipp.supabase.co",
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InR4Zmprb2R1aWZ0Yndjam54aXBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1NzYyMjQsImV4cCI6MjA4OTE1MjIyNH0.YJHnMFScXleuH1VBaf7igYMuZVDQp9lg7kW8Hmoljpo"
);

// ====== VARIABLES ======
let username = "";
let role = "user";
const chatDiv = document.getElementById("chat");
const chatMessages = document.getElementById("chat-messages");
const loginForm = document.getElementById("login-form");

// ====== ROLE BADGE ======
function badge(role){
  if(role=="owner") return "👑";
  if(role=="admin") return "🛡️";
  return "";
}

// ====== SCROLL CHAT ======
function scrollChat(){
  chatMessages.scrollTop = chatMessages.scrollHeight;
}

// ====== LOAD MESSAGES ======
async function loadMessages(){
  const { data, error } = await supabase
    .from("messages")
    .select("*")
    .order("created_at", { ascending: true });

  if(error){ console.error(error); return; }

  chatMessages.innerHTML = "";
  data.forEach(m => {
    chatMessages.innerHTML += `<p>${badge(m.role)} <b>${m.username}</b>: ${m.message}</p>`;
  });
  scrollChat();
}

// ====== SEND MESSAGE ======
async function send(){
  let msgInput = document.getElementById("msg");
  let msg = msgInput.value.trim();
  if(!msg) return;

  const { error } = await supabase.from("messages").insert({
    username: username,
    message: msg,
    role: role
  });

  if(error){ console.error(error); return; }

  msgInput.value = "";
}

// ====== ENTER KEY TO SEND ======
document.getElementById("msg").addEventListener("keydown", function(e){
  if(e.key === "Enter") send();
});

// ====== REGISTER USER ======
async function register(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  if(!user || !pass) return alert("Enter username and password");

  // check if user exists
  const { data: existing } = await supabase.from("users").select("*").eq("username", user).maybeSingle();
  if(existing) return alert("Username already exists");

  // insert new user with role 'user'
  const { error } = await supabase.from("users").insert({
    username: user,
    password: pass,
    role: "user"
  });

  if(error){ console.error(error); return alert("Registration failed"); }

  username = user;
  role = "user";
  startChat();
}

// ====== LOGIN USER ======
async function login(){
  let user = document.getElementById("username").value.trim();
  let pass = document.getElementById("password").value.trim();
  if(!user || !pass) return alert("Enter username and password");

  const { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("username", user)
    .eq("password", pass)
    .maybeSingle();

  if(error){ console.error(error); return alert("Login failed"); }
  if(!data) return alert("Wrong username or password");

  username = data.username;
  role = data.role;
  startChat();
}

// ====== START CHAT AFTER LOGIN ======
function startChat(){
  loginForm.style.display = "none";
  chatDiv.style.display = "block";
  loadMessages();
}

// ====== ADMIN LOGIN (button) ======
async function adminLogin(){
  let user = prompt("Username");
  let pass = prompt("Password");
  if(!user || !pass) return alert("Username and Password required");

  const { data, error } = await supabase
    .from("users")
    .select("*")
    .eq("username", user)
    .eq("password", pass)
    .maybeSingle();

  if(error){ console.error(error); return alert("Error logging in"); }
  if(!data) return alert("Wrong login");

  username = data.username;
  role = data.role;
  startChat();
  alert("Logged in as " + role);
}

// ====== REALTIME SUBSCRIPTION ======
supabase.channel('chat')
  .on(
    'postgres_changes',
    { event:'INSERT', schema:'public', table:'messages' },
    payload => {
      const m = payload.new;
      chatMessages.innerHTML += `<p>${badge(m.role)} <b>${m.username}</b>: ${m.message}</p>`;
      scrollChat();
    }
  )
  .subscribe();
</script>

</body>
</html>
