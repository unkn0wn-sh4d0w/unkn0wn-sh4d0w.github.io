<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Page Not Found</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    *:focus {
     outline: none;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      user-select: none;
      position: relative;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      max-width: 600px;
      padding: 24px;
      z-index: 2;
    }

    h1 {
      font-size: 8rem;
      animation: float 3s ease-in-out infinite;
      line-height: 1;
    }

    h2 {
      font-size: 1.8rem;
    }

    p {
      opacity: 0.9;
      max-width: 420px;
    }

    a {
      display: inline-block;
      margin-top: 10px;
      padding: 12px 25px;
      background: white;
      color: #764ba2;
      text-decoration: none;
      border-radius: 25px;
      font-weight: bold;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      box-shadow: 0 6px 20px rgba(0,0,0,0.25);
      will-change: transform;
    }

    a:hover {
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 14px 30px rgba(0,0,0,0.35);
      background: #f1f1f1;
    }

    a:active {
      transform: translateY(-2px) scale(1.02);
    }

    .naas-message-box {
      width: 100%;
      max-width: 420px;
      margin-top: 10px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    .naas-title {
      font-size: 11px;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.6;
    }

    #naas-message {
      font-size: 14px;
      line-height: 1.4;
      text-align: center;
    }

    .circle {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.1);
      animation: move linear infinite;
      will-change: transform;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-15px); }
    }

    @keyframes move {
      from { transform: translateY(0); }
      to { transform: translateY(-120vh); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>404</h1>
    <h2>Oops! Page not found</h2>
    <p>The page you are looking for might have been removed or is temporarily unavailable.</p>

    <div class="naas-message-box">
      <div class="naas-title">Server Message</div>
      <div id="naas-message">Loading...</div>
    </div>

    <a href="https://unkn0wn-sh4d0w.github.io/">Go Home</a>
  </div>

  <script>
    document.addEventListener("contextmenu", e => e.preventDefault());

    document.addEventListener("wheel", e => e.preventDefault(), { passive: false });
    document.addEventListener("touchmove", e => e.preventDefault(), { passive: false });

    document.addEventListener("keydown", function(e) {
      const keys = [32, 37, 38, 39, 40, 33, 34];
      if (keys.includes(e.keyCode)) e.preventDefault();
    });

    function createCircle() {
      const circle = document.createElement("div");
      circle.classList.add("circle");

      const size = Math.random() * 60 + 20;
      circle.style.width = size + "px";
      circle.style.height = size + "px";

      circle.style.left = Math.random() * (window.innerWidth - size) + "px";
      circle.style.bottom = -size + "px";
      circle.style.animationDuration = (Math.random() * 5 + 5) + "s";

      document.body.appendChild(circle);

      setTimeout(() => circle.remove(), 10000);
    }

    setInterval(createCircle, 500);

    async function loadNaasMessage() {
      const el = document.getElementById("naas-message");

      try {
        const res = await fetch("https://naas.isalman.dev/no");
        let text = await res.text();

        try {
          const json = JSON.parse(text);
          text = json.message || json.reason || text;
        } catch (e) {}

        text = text.replace(/^Reason:\s*/i, "").trim();
        el.textContent = text;
      } catch (err) {
        el.textContent = "Failed to load message";
      }
    }

    loadNaasMessage();
  </script>

</body>
</html>
