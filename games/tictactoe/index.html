<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🧮 Tic Tac Toe</title>
<style>
:root{
  --bg1:#0b1220; --bg2:#111a2e; --accent:#7c3aed; --accent2:#22d3ee; --danger:#fb7185; --win:#22c55e;
  --glass: rgba(255,255,255,0.06);
  --stroke: rgba(255,255,255,0.12);
}
*{box-sizing:border-box}
body{
  margin:0; font-family:Inter,sans-serif; color:white;
  background: linear-gradient(135deg,var(--bg1),var(--bg2));
  min-height:100vh;
  display:flex; align-items:center; justify-content:center;
}
.container{width:100%; max-width:420px; padding:16px}
h1{text-align:center; font-size:28px; margin-bottom:10px;
  background: linear-gradient(90deg,var(--accent),var(--accent2));
  -webkit-background-clip:text; color:transparent;}
.panel{border:1px solid var(--stroke); border-radius:16px; padding:14px; transition:0.3s;}
.scoreboard{display:flex; justify-content:space-between; font-size:14px}
.name{background:rgba(255,255,255,0.08); padding:4px 8px; border-radius:999px}
.wins{text-align:center; font-size:13px; margin:6px 0}
.modes{display:flex; flex-wrap:wrap; gap:6px; justify-content:center}
.mode-btn{padding:5px 9px; border-radius:999px; border:1px solid var(--stroke); background:transparent; color:white; font-size:11px; cursor:pointer; transition:0.2s;}
.mode-btn.active{background:linear-gradient(90deg,var(--accent),var(--accent2)); color:black}
.board{
  display:grid; grid-template-columns:repeat(3,1fr); grid-template-rows:repeat(3,1fr); gap:8px;
  width:min(320px,90vw); height:min(320px,90vw); margin:14px auto; position:relative;
}
.cell{
  width:100%; height:100%; aspect-ratio:1/1; border:none; border-radius:14px;
  background:rgba(255,255,255,0.08); font-size:clamp(26px,8vw,38px); display:flex; align-items:center; justify-content:center; cursor:pointer; transition:0.15s;
}
.cell:hover{transform:scale(1.05)}
.cell.x{color:var(--accent2); animation:pop 0.2s;}
.cell.o{color:var(--danger); animation:pop 0.2s;}
@keyframes pop{0%{transform:scale(0)}50%{transform:scale(1.2)}100%{transform:scale(1)}}
.win-line{
  position:absolute; height:6px; background:var(--win); box-shadow:0 0 10px var(--win);
  top:50%; left:50%; transform:translate(-50%,-50%) scaleX(0); transform-origin:center; border-radius:999px; transition:transform 0.3s ease;
}
.status{text-align:center; font-size:13px; margin-top:8px}
.controls{display:flex; justify-content:center; margin-top:8px}
.btn{padding:8px 12px; border:none; border-radius:10px; cursor:pointer; background:linear-gradient(90deg,var(--accent),var(--accent2)); color:black; transition:0.2s;}
.btn:hover{opacity:0.85; transform:scale(1.05);}
.input{padding:10px; border-radius:8px; border:none; margin:10px 0}
.popup {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    pointer-events: auto;
}
.popup-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  pointer-events: none;
  z-index: 500;
  opacity: 0;
  transition: opacity 0.3s ease;
}

.popup-overlay.active {
  pointer-events: auto;
  opacity: 1;
}
.popup-card {
    background:#1e293b; 
    padding:20px; 
    border-radius:12px; 
    text-align:center; 
    animation:popupIn 0.3s ease;
}

@keyframes popupIn{0%{opacity:0; transform:scale(0.8)}100%{opacity:1; transform:scale(1)}}

.center-popup{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  z-index: 10000;
}

.center-box{
  background:#0f172a; padding:30px; border-radius:16px; text-align:center; box-shadow:0 20px 60px rgba(0,0,0,0.6);
  font-size:24px; color:var(--win); opacity:0; transition:opacity 0.3s, transform 0.3s;
}
.center-box.show{
  opacity:1;
  transform: scale(1.05);
}
footer{text-align:center;opacity:.6;margin-top:30px;font-size:14px;}
</style>
</head>
<body>
<div class="container">
<h1>Tic Tac Toe</h1>
<div class="panel">
  <div class="scoreboard">
    <div id="playerName" class="name">Player</div>
    <div class="name">Robot</div>
  </div>
  <div class="wins"><span id="playerWins">0</span> - <span id="aiWins">0</span></div>
  <div class="modes">
    <button class="mode-btn active" onclick="setMode('easy', this)">Easy</button>
    <button class="mode-btn" onclick="setMode('medium', this)">Medium</button>
    <button class="mode-btn" onclick="setMode('hard', this)">Hard</button>
    <button class="mode-btn" onclick="setMode('impossible', this)">Impossible</button>
  </div>
  <div class="board" id="board"><div class="win-line" id="winLine"></div></div>
  <div class="status" id="status">Your turn</div>
  <div class="controls"><button class="btn" onclick="reset()">Restart</button></div>
<footer>© 2026 Sh4dow</footer>
</div>
</div>

<div class="popup-overlay" id="popupOverlay"></div>

<div class="popup" id="popup">
  <div class="popup-card">
    <h3>What should we call you?</h3>
    <input id="nameInput" class="input" placeholder="Your name"><br>
    <button class="btn" onclick="startGame()">Start</button>
  </div>
</div>

<div class="center-popup" id="centerPopup">
  <div class="center-box" id="resultText"></div>
</div>

<script>
let cells = Array(9).fill(null);
let playerTurn = true;
let playerWins = 0, aiWins = 0;
let mode = 'easy';
const board = document.getElementById('board');
const statusEl = document.getElementById('status');
const popupOverlay = document.getElementById('popupOverlay');
const namePopup = document.getElementById('popup');
const centerPopup = document.getElementById('centerPopup');
const resultText = document.getElementById('resultText');
let winLine = document.getElementById('winLine');

function setMode(m,el){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}

function createBoard(){
  board.innerHTML='<div class="win-line" id="winLine"></div>';
  winLine = document.getElementById('winLine');
  for(let i=0;i<9;i++){
    const c=document.createElement('button');
    c.className='cell '+(cells[i]?cells[i].toLowerCase():'');
    c.textContent=cells[i]||'';
    c.onclick=()=>handleClick(i);
    board.appendChild(c);
  }
}

function handleClick(i){
  if(cells[i]||!playerTurn) return;
  cells[i]='X'; playerTurn=false; update();
  if(!endCheck()) setTimeout(aiMove,300);
}

function aiMove(){
  let move;

  if(mode === 'easy'){
    move = randomMove();
  }

  else if(mode === 'medium'){
    move = Math.random() < 0.5 ? randomMove() : bestMove();
  }

  else if(mode === 'hard'){
    move = Math.random() < 0.8 ? bestMove() : randomMove();
  }

  else if(mode === 'impossible'){
    move = bestMove();
 }

  cells[move]='O';
  playerTurn=true;
  update();
  endCheck();
}

function randomMove(){ 
  let empty=cells.map((v,i)=>v?null:i).filter(v=>v!==null);
  return empty[Math.floor(Math.random()*empty.length)];
}

function bestMove(){
  let best=-Infinity, move=0;
  for(let i=0;i<9;i++){
    if(!cells[i]){
      cells[i]='O';
      let score=minimax(cells,false);
      cells[i]=null;
      if(score>best){best=score; move=i;}
    }
  }
  return move;
}

function minimax(b,max){
  const w=winner(b);
  if(w){if(w.player==='O') return 1; else if(w.player==='X') return -1;}
  if(!b.includes(null)) return 0;
  if(max){ let best=-Infinity; for(let i=0;i<9;i++) if(!b[i]){b[i]='O'; best=Math.max(best,minimax(b,false)); b[i]=null;} return best; }
  else { let best=Infinity; for(let i=0;i<9;i++) if(!b[i]){b[i]='X'; best=Math.min(best,minimax(b,true)); b[i]=null;} return best; }
}

function winner(b=cells){
  const L=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for(const combo of L){
    const [a,b1,c]=combo;
    if(b[a] && b[a]===b[b1] && b[a]===b[c]) return {player:b[a], combo};
  }
  return null;
}

function drawLine(combo){
  const map={
    "0,1,2":{top:"16%",left:"50%",rotate:"0deg"},
    "3,4,5":{top:"50%",left:"50%",rotate:"0deg"},
    "6,7,8":{top:"84%",left:"50%",rotate:"0deg"},
    "0,3,6":{top:"50%",left:"16%",rotate:"90deg"},
    "1,4,7":{top:"50%",left:"50%",rotate:"90deg"},
    "2,5,8":{top:"50%",left:"84%",rotate:"90deg"},
    "0,4,8":{top:"50%",left:"50%",rotate:"45deg"},
    "2,4,6":{top:"50%",left:"50%",rotate:"-45deg"}
  };
  const pos=map[combo.join(",")];
  winLine.style.top=pos.top; winLine.style.left=pos.left; winLine.style.width="90%";
  winLine.style.transform=`translate(-50%,-50%) rotate(${pos.rotate}) scaleX(0)`;
  setTimeout(()=>{winLine.style.transform=`translate(-50%,-50%) rotate(${pos.rotate}) scaleX(1)`;},50);
}

function showCenter(text){
  resultText.textContent=text;
  popupOverlay.style.background='rgba(0,0,0,0.6)';
  popupOverlay.style.pointerEvents='auto';
  centerPopup.style.pointerEvents='auto';

  setTimeout(()=>{
    resultText.classList.add('show');
  },400);

  setTimeout(()=>{
    resultText.classList.remove('show');
    centerPopup.style.pointerEvents='none';
    popupOverlay.style.background='transparent';
    popupOverlay.style.pointerEvents='none';
    reset();
  },2000);
}

function endCheck(){
  const res=winner();
  if(res){
    drawLine(res.combo);
    setTimeout(()=>{
      if(res.player==='X'){playerWins++; showCenter('You Win!');}
      else{aiWins++; showCenter('Robot Wins!');}
      updateScore();
    },350);
    return true;
  }
  if(!cells.includes(null)){
    setTimeout(()=>showCenter('Draw'),350);
    return true;
  }
  statusEl.textContent=playerTurn?'Your turn':'Robot thinking...';
  return false;
}

function reset(){ cells=Array(9).fill(null); createBoard(); playerTurn=true;}
function update(){ createBoard();}
function updateScore(){ document.getElementById('playerWins').textContent=playerWins; document.getElementById('aiWins').textContent=aiWins;}

function startGame() {
    const name = document.getElementById('nameInput').value || 'Player';
    document.getElementById('playerName').textContent = name;
    namePopup.style.display = 'none';
    popupOverlay.classList.remove('active');
  }

function showCenter(text){
  resultText.textContent = text;
  popupOverlay.classList.add('active');
  centerPopup.style.pointerEvents='auto';

  setTimeout(()=>{
    resultText.classList.add('show');
  },400);

  setTimeout(()=>{
    resultText.classList.remove('show');
    centerPopup.style.pointerEvents='none';
    popupOverlay.classList.remove('active'); 
    reset();
  },2000);
}

window.addEventListener('load', () => {
  popupOverlay.classList.add('active');
  namePopup.style.display = 'flex';
});

createBoard();
</script>
</body>
</html>
