<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:Arial, sans-serif;
  background: linear-gradient(270deg,#0f2027,#203a43,#2c5364);
  background-size:600% 600%;
  animation: gradientMove 12s ease infinite;
  color:white;
}

@keyframes gradientMove{
  0%{background-position:0% 50%;}
  50%{background-position:100% 50%;}
  100%{background-position:0% 50%;}
}

.menu{
  text-align:center;
  padding:40px;
  border-radius:15px;
  background:rgba(0,0,0,0.5);
  backdrop-filter:blur(10px);
  box-shadow:0 0 25px rgba(0,0,0,0.6);
}

h1{
  margin-bottom:30px;
  font-size:40px;
}

button{
  display:block;
  width:220px;
  padding:15px;
  margin:15px auto;
  font-size:20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  transition:all 0.25s ease;
  color:white;
  font-weight:bold;
}

.user{
  background:#3498db;
  box-shadow:0 0 15px #3498db;
}

button:hover{
  transform:scale(1.12);
  filter:brightness(1.2);
}

footer{
  text-align:center;
  opacity:.6;
  margin-top:30px;
  font-size:14px;
}
</style>
</head>

<body>

<div class="menu">
<h1>What user would you like to view?</h1>

<button class="user" onclick="openPage('@omg.skyeee')">@omg.skyeee</button>
<button class="user" onclick="openPage('@unkn0wn.sh4d0w')">@unkn0wn.sh4d0w</button>

<footer>© 2026 Sh4dow</footer>
</div>

<script>
function openPage(user){
  window.open("https://unkn0wn-sh4d0w.github.io/user/" + user);
}
</script>

</body>
</html>
