<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>@retr0.</title>

<style>
html {
  font-size: clamp(12px, 0.9vw + 0.5rem, 20px);
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #1e1f22;

  display: flex;
  justify-content: center;
  align-items: center;

  min-height: 100vh;
  padding: 2vw;
  color: white;
}

.profile {
  width: 100%;
  max-width: 34rem; /* scales with html font-size */
  background: #2b2d31;
  border-radius: 1rem;
  padding: 1rem;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.header {
  display: flex;
  align-items: center;
  gap: 1rem;
}

* {
  font-family: "gg sans", "Noto Sans", "Helvetica Neue", Helvetica, Arial, sans-serif;
}

.avatar {
  width: 5rem;
  height: 5rem;
  border-radius: 50%;
  object-fit: cover;
  border: 0.2rem solid #1e1f22;
  flex-shrink: 0;
}

.text {
  display: flex;
  flex-direction: column;
  gap: 0.2rem;
}

.username {
  font-size: 1.4rem;
  font-weight: 700;
}

.handle {
  font-size: 0.9rem;
  color: #949ba4;
}

.section {
  background: #232428;
  margin-top: 0.8rem;
  padding: 0.8rem;
  border-radius: 0.8rem;
}

.section-title {
  font-size: 0.7rem;
  color: #b5bac1;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}

.bio {
  font-size: 1rem;
}

/* ROLES */
.roles {
  display: flex;
  flex-wrap: wrap;
  gap: 0.4rem;
}

.role {
  background: #3f4147;
  padding: 0.3rem 0.7rem;
  border-radius: 999px;
  font-size: 0.8rem;
}

.connections {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.connection {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #2b2d31;
  padding: 0.7rem 0.8rem;
  border-radius: 0.6rem;
  text-decoration: none;
  color: white;
  transition: 0.2s;
}

.connection:hover {
  background: #313338;
}

.conn-left {
  display: flex;
  align-items: center;
  gap: 0.6rem;
}

.conn-left img {
  width: 1.2rem;
  height: 1.2rem;
}
.link {
  color: #00ABFD;
  text-decoration: none; /* removes underline */
  font-weight: 700;      /* makes it bold */
}
</style>

</head>

      <a class="link" href="https://discord.gg/HQpNG7Cy4Q">
        https://discord.gg/HQpNG7Cy4Q
        </a>- Checkpoint Zulu

  </div>

  <div class="section">

  <div class="section">
    <div class="section-title">Roles</div>

  <div class="section">
